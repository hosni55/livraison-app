# ============================================================
# Application Configuration
# ============================================================
spring.application.name=livraison-backend
server.port=8080

# ============================================================
# Oracle Database Configuration
# ============================================================
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=c##livraison
spring.datasource.password=livraison123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
app.jwt.expiration-ms=86400000

# ============================================================
# Gemini AI Configuration (Free tier: 15 req/min, 1M tokens/day)
# Get your free API key at: https://aistudio.google.com/apikey
# ============================================================
gemini.api.key=YOUR_GEMINI_API_KEY_HERE
gemini.model=gemini-2.0-flash
firebase.config.path=classpath:firebase-service-account.json

# ============================================================
# File Upload Configuration
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ============================================================
# Logging
# ============================================================
logging.level.com.supervision.livraison=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
